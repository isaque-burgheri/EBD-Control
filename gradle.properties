# Em redes corporativas (proxy/antivírus que intercepta HTTPS), o Gradle pode
# falhar ao baixar dependências com "PKIX path building failed / unable to find
# valid certification path". A opção abaixo faz o Gradle confiar na central de
# certificados do Windows (onde o certificado da empresa já costuma estar),
# resolvendo o erro. Em rede normal/doméstica é inofensiva. (Só Windows.)
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# Room 2.6.1 funciona melhor com o processador KSP1:
ksp.useKSP2=false
